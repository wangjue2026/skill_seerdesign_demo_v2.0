<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L-3.0 L型导航模版骨架</title>
  
  <!-- 引入 Google Fonts 字体库 (Inter 用于常规字, Outfit 用于数字/标签) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 引入 SeerDesign 全局样式与覆盖类名 -->
  <link rel="stylesheet" href="../assets/css-overrides.css">
  
  <!-- 引入 Alpine.js (轻量声明式交互，免构建) -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'PingFang SC', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          fontSize: {
            'xs': ['12px', '20px'],   // 字号 12px, 行高 20px (常规/表格)
            'md': ['14px', '22px'],   // 字号 14px, 行高 22px (表单/弹窗按钮)
            'lg': ['16px', '24px'],   // 字号 16px, 行高 24px (标题)
            'xl': ['20px', '28px'],
          },
          borderRadius: {
            'control': '2px',         // 控件圆角 2px
            'container': '4px',       // 容器卡片圆角 4px
            'table': '0px',           // 表格直角
          },
          spacing: {
            '0.5': '2px',
            '1': '4px',
            '2': '8px',
            '3': '12px',
            '4': '16px',
            '6': '24px',
            '8': '32px',
          },
          colors: {
            brand: {
              DEFAULT: 'var(--color-blue)',      // 品牌蓝 #1C6EFF
              hover: 'var(--color-blue-l10)',    // 悬浮蓝 #4FA1FF
              active: 'var(--color-blue-d10)',   // 点击蓝 #1458CC
              lightBg: 'var(--color-blue-l50)',  // 选中浅蓝背景 #E8F4FF
            },
            risk: 'var(--color-red)',            // #F52727
            warning: 'var(--color-orange)',      // #FA721B
            text: {
              DEFAULT: 'var(--color-graphite-d40)', // 正文 #2F3540
              title: 'var(--color-graphite-d30)',   // 标题 #454C59
              mute: 'var(--color-graphite)',        // 辅助色 #A1A7B3
            },
            border: 'var(--color-graphite-l20)',    // 一级边框 #D3D7DE
            bg: {
              light: 'var(--color-graphite-l50)',   // 浅底背景 #F7F9FC
              line: 'var(--color-graphite-l30)',    // 分割线 #E1E5EB
            }
          }
        }
      }
    }
  </script>
  
  <style>
    /* ========================================================
       1. L型导航特定的顶部导航及侧边栏样式
       ======================================================== */
    .l-topbar {
      background-color: #2F3540; /* 顶部导航深色背景 */
    }
    .l-topbar-nav-item {
      height: 100%;
      padding: 0 20px;
      display: flex;
      align-items: center;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }
    .l-topbar-nav-item:hover, .l-topbar-nav-item.active {
      color: #FFFFFF;
      background-color: rgba(255, 255, 255, 0.05);
    }
    .l-topbar-nav-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 3px;
      background-color: var(--color-blue);
    }
    .l-sidebar {
      background-color: #212730; /* 左侧二级导航深底色 */
      font-family: var(--seer-font-family);
    }
    .l-menu-item-l2 {
      height: 40px;
      padding: 0 16px 0 24px;
      display: flex;
      align-items: center;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .l-menu-item-l2:hover {
      background-color: rgba(255, 255, 255, 0.04);
      color: #FFFFFF;
    }
    .l-menu-item-l2.selected {
      background-color: var(--color-blue);
      color: #FFFFFF;
      font-weight: 600;
    }
    .l-menu-item-l2.selected::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background-color: #4BFFC6;
      box-shadow: 0 0 4px rgba(75, 255, 198, 0.6);
    }

    /* ========================================================
       2. 标题栏 Tabs 选中态下划线对齐样式
       ======================================================== */
    .page-title-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 16px;
      right: 16px;
      height: 2px;
      background-color: var(--color-blue);
      border-radius: 2px 2px 0 0;
    }

    /* ========================================================
       3. 表格横向滚动与冻结列样式 (Sticky Columns)
       关键陷阱：css-overrides.css 对 .sd-table th 设置了 position: relative !important
       因此必须使用 table.sd-table th/td.sticky-xxx 更高特异性 + !important 才能让 sticky 生效
       禁止使用 table-fixed
       详见：assets/seerdesign-cheat-sheet.md § 3.8 冻结列骨架
       ======================================================== */

    /* 可横向滚动的表格容器 */
    .sd-table-responsive {
      overflow-x: auto;
      overflow-y: auto;
      position: relative;
    }
    .sd-table-responsive::-webkit-scrollbar { width: 6px; height: 6px; }
    .sd-table-responsive::-webkit-scrollbar-thumb { background-color: rgba(120,130,145,0.32); border-radius: 3px; }
    .sd-table-responsive::-webkit-scrollbar-thumb:hover { background-color: rgba(80,90,110,0.55); }
    .sd-table-responsive::-webkit-scrollbar-track { background: transparent; }

    /* 操作列 (倒数第二列)：sticky right = 更多列宽度 40px */
    table.sd-table th.sticky-op-col,
    table.sd-table td.sticky-op-col {
      position: sticky !important;
      right: 40px !important;
      z-index: 12 !important;
      width: 120px !important;
      min-width: 120px !important;
      box-shadow: -4px 0 6px -3px rgba(30,35,43,0.14) !important;
    }
    table.sd-table th.sticky-op-col { background-color: var(--color-graphite-l40) !important; z-index: 20 !important; }
    table.sd-table td.sticky-op-col { background-color: #ffffff !important; }
    table.sd-table tr:hover td.sticky-op-col { background-color: var(--color-graphite-l50) !important; }

    /* 更多列 (最后一列)：sticky right = 0 */
    table.sd-table th.sticky-more-col,
    table.sd-table td.sticky-more-col {
      position: sticky !important;
      right: 0 !important;
      z-index: 12 !important;
      width: 40px !important;
      min-width: 40px !important;
      box-shadow: none !important;
    }
    table.sd-table th.sticky-more-col { background-color: var(--color-graphite-l40) !important; z-index: 20 !important; }
    table.sd-table td.sticky-more-col { background-color: #ffffff !important; }
    table.sd-table tr:hover td.sticky-more-col { background-color: var(--color-graphite-l50) !important; }

    /* 有可滚动内容时加深阴影，滚到最右时隐藏阴影 */
    .table-has-scroll table.sd-table th.sticky-op-col,
    .table-has-scroll table.sd-table td.sticky-op-col {
      box-shadow: -6px 0 10px -4px rgba(30,35,43,0.20) !important;
    }
    .table-scrolled-end table.sd-table th.sticky-op-col,
    .table-scrolled-end table.sd-table td.sticky-op-col {
      box-shadow: none !important;
    }
  </style>
</head>
<body class="bg-bg-light text-text font-sans overflow-hidden w-screen h-screen">

  <!-- 顶层数据和交互容器 -->
  <div class="flex flex-col w-full h-full" x-data="{ topNav: 'ztna', sideNav: 'user', activeTab: 'list', profileOpen: false }">

    <!-- 1. 顶部一级导航栏 (高度 48px) -->
    <div class="l-topbar h-12 flex items-center px-4 flex-shrink-0 text-white select-none">
      <!-- 品牌 Logo -->
      <div class="w-8 h-8 rounded-control flex items-center justify-center font-bold text-xs tracking-wide text-white" 
           style="background: linear-gradient(135deg, #4BFFC6, #1C6EFF);">
        SD
      </div>
      <span class="ml-2 text-xs font-semibold tracking-wide truncate mr-8">aTrust 零信任安全控制台</span>

      <!-- 顶部菜单项 -->
      <div class="flex h-full items-center">
        <div class="l-topbar-nav-item" :class="topNav === 'ztna' && 'active'" @click="topNav = 'ztna'">零信任访问</div>
        <div class="l-topbar-nav-item" :class="topNav === 'policy' && 'active'" @click="topNav = 'policy'">策略中心</div>
        <div class="l-topbar-nav-item" :class="topNav === 'log' && 'active'" @click="topNav = 'log'">日志报表</div>
      </div>

      <!-- 右侧管理员头像 -->
      <div class="ml-auto flex items-center gap-2 relative">
        <div class="w-5 h-5 rounded-full bg-brand flex items-center justify-center text-[10px] text-white font-semibold cursor-pointer"
             @click="profileOpen = !profileOpen">
          U
        </div>
        <span class="text-xs text-white/85">Admin</span>
        <!-- 登出小面板 -->
        <div class="absolute right-0 top-7 bg-[#1E232B] border border-bg-line rounded-control p-2 shadow-lg w-28 text-white z-50 text-xs"
             x-show="profileOpen" @click.outside="profileOpen = false" x-transition>
          <div class="hover:bg-white/10 p-1.5 rounded cursor-pointer" onclick="alert('个人中心')">个人设置</div>
          <div class="hover:bg-white/10 p-1.5 rounded cursor-pointer text-risk" onclick="alert('登出')">安全退出</div>
        </div>
      </div>
    </div>

    <!-- 2. 下方主视区 (侧边栏 + 内容区) -->
    <div class="flex-1 flex overflow-hidden w-full">

      <!-- 2.1 左侧二级导航 (高度占满，宽度固定 200px) -->
      <div class="l-sidebar w-[200px] flex flex-col flex-shrink-0 text-white select-none">
        <div class="flex-1 overflow-y-auto py-2">
          <!-- 零信任访问侧边菜单 -->
          <template x-if="topNav === 'ztna'">
            <div>
              <div class="l-menu-item-l2" :class="sideNav === 'user' && 'selected'" @click="sideNav = 'user'">
                用户与身份管理
              </div>
              <div class="l-menu-item-l2" :class="sideNav === 'connector' && 'selected'" @click="sideNav = 'connector'">
                连接器管理
              </div>
              <div class="l-menu-item-l2" :class="sideNav === 'app' && 'selected'" @click="sideNav = 'app'">
                资源与应用管理
              </div>
            </div>
          </template>
          
          <!-- 策略中心侧边菜单 -->
          <template x-if="topNav === 'policy'">
            <div>
              <div class="l-menu-item-l2" :class="sideNav === 'access' && 'selected'" @click="sideNav = 'access'">
                访问控制策略
              </div>
              <div class="l-menu-item-l2" :class="sideNav === 'trust' && 'selected'" @click="sideNav = 'trust'">
                动态信任评估
              </div>
            </div>
          </template>
        </div>
      </div>

      <!-- 2.2 右侧业务视图区 (包含 12px / p-3 外间距) -->
      <div class="flex-1 bg-bg-light overflow-hidden p-3 flex flex-col">

        <!-- C. 内容卡片 - 纯白背景, 2px 圆角 (预留 shadow 样式)，左右 padding 12px (px-3)，包含顶层 PageTitle -->
        <div class="bg-white rounded-container shadow-[0_1px_3px_rgba(0,0,0,0.05)] px-3 flex-1 flex flex-col overflow-hidden">
          
          <!-- C.1 页面页头 (Page Title) - 吸附在内容卡片最顶层，高度固定 48px (h-12)，左间距相对卡片为 16px (pl-4) -->
          <div class="h-12 border-b border-bg-line flex items-center pl-4 flex-shrink-0 relative select-none">
            <span class="text-xs font-semibold text-text-title">用户与身份管理</span>
            <span class="w-[1px] h-4 bg-bg-line mx-3"></span>
            
            <!-- 页头内嵌 Tab 切换 -->
            <div class="flex h-full items-center">
              <div class="page-title-tab relative h-full flex items-center px-4 text-xs cursor-pointer text-text hover:text-brand transition-colors"
                   :class="activeTab === 'list' && 'active text-brand font-semibold'"
                   @click="activeTab = 'list'">
                用户列表
              </div>
              <div class="page-title-tab relative h-full flex items-center px-4 text-xs cursor-pointer text-text hover:text-brand transition-colors"
                   :class="activeTab === 'config' && 'active text-brand font-semibold'"
                   @click="activeTab = 'config'">
                全局安全策略
              </div>
            </div>
          </div>

          <!-- C.2 业务内容区域 -->
          <div class="flex-1 flex flex-col overflow-hidden py-3">
            
            <!-- tab 1: 用户列表 -->
            <div x-show="activeTab === 'list'" class="flex-1 flex flex-col overflow-hidden">
              <div class="flex-1 border border-dashed border-border flex flex-col items-center justify-center text-text-mute text-xs rounded-control gap-2">
                <span>【用户列表 业务内容区】</span>
                <span>在此处添加筛选 Toolbar、数据表格 `.sd-table` 和吸底分页器 `.sd-pagination`</span>
              </div>
            </div>

            <!-- tab 2: 全局安全策略 -->
            <div x-show="activeTab === 'config'" class="flex-1 flex flex-col overflow-hidden">
              <div class="flex-1 border border-dashed border-border flex flex-col items-center justify-center text-text-mute text-xs rounded-control gap-2">
                <span>【全局安全策略 配置区】</span>
                <span>在此处添加配置表单 `.sd-form` 或配置步骤组件</span>
              </div>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
